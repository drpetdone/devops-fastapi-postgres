name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build FastAPI image
        run: docker build -t fastapi-test ./app

      - name: Run container
        run: |
          docker run -d --name test-api -p 8000:8000 fastapi-test
          sleep 5
          docker ps
